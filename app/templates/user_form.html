{% extends 'base.html' %}
{% block title %}Benutzer {{ action }} – Tigers Auth{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('users.index') }}" class="p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Benutzer {{ action }}</h1>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow border border-slate-200 dark:border-slate-700 p-6">
        <form method="POST" class="space-y-4">

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Benutzername *</label>
                <input type="text" name="username" value="{{ form.username.data or '' }}" required
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                {% for error in form.username.errors %}
                <p class="mt-1 text-xs text-red-500">{{ error }}</p>
                {% endfor %}
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                    Passwort {% if action == 'Erstellen' %}*{% else %}(leer lassen = unverändert){% endif %}
                </label>
                <input type="password" name="password" autocomplete="new-password"
                    {% if action == 'Erstellen' %}required{% endif %}
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
                    placeholder="{% if action == 'Erstellen' %}Mindestens 8 Zeichen{% else %}Leer lassen für keine Änderung{% endif %}">
                {% for error in form.password.errors %}
                <p class="mt-1 text-xs text-red-500">{{ error }}</p>
                {% endfor %}
            </div>

            <!-- Role -->
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Rolle</label>
                <select name="role"
                    class="block w-full px-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    {% for value, label in form.role.choices %}
                    <option value="{{ value }}" {% if form.role.data == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Active -->
            <div class="flex items-center gap-3">
                <input type="checkbox" id="is_active" name="is_active" value="y"
                    {% if form.is_active.data %}checked{% endif %}
                    class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
                <label for="is_active" class="text-sm font-medium text-slate-700 dark:text-slate-300">Benutzer aktiv</label>
            </div>

            <!-- Actions -->
            <div class="flex gap-3 pt-2">
                <button type="submit"
                    class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition text-sm">
                    <i class="bi bi-check-lg mr-2"></i>{{ action }}
                </button>
                <a href="{{ url_for('users.index') }}"
                    class="flex-1 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 font-semibold rounded-lg transition text-sm text-center">
                    Abbrechen
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
